<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTK WEAR</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0b0d;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:15px 25px;
border-bottom:1px solid #222;
background:#0b0b0d;
position:sticky;
top:0;
}

.logo{font-size:20px;font-weight:700;}

.btn{
background:#fff;
color:#000;
padding:8px 12px;
border-radius:12px;
border:none;
cursor:pointer;
margin-left:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#141418;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:12px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
cursor:pointer;
}

.add{background:#222;color:#fff;}
.buy{background:#fff;color:#000;}

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:#111;
padding:15px;
overflow:auto;
transition:0.3s;
border-left:1px solid #222;
}

.cart.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.remove{
background:red;
color:#fff;
padding:3px 6px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

.closeCart{
background:#fff;
color:#000;
padding:8px;
border-radius:10px;
border:none;
cursor:pointer;
width:100%;
margin-bottom:10px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:20px;
border-radius:12px;
width:300px;
color:#fff;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<header>
<div class="logo">JTK WEAR</div>
<div>
<button class="btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
<button class="btn" onclick="openAdmin()">Admin</button>
</div>
</header>

<div id="app"></div>

<div class="cart" id="cart"></div>

<!-- ADMIN -->
<div class="modal" id="admin">
<div class="modal-box">
<h3>Админ панель</h3>

<input id="pass" placeholder="Пароль">
<button class="btn" onclick="checkPass()">Войти</button>

<div id="adminPanel" style="display:none;">
<input id="name" placeholder="Название">
<input id="price" placeholder="Цена">
<input id="img" placeholder="Фото URL">
<button class="btn" onclick="addProduct()">Добавить товар</button>
</div>

<br>
<button class="btn" onclick="closeAdmin()">Закрыть</button>
</div>
</div>

<script>

/* ТОВАРЫ */
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Пижама тройка",price:"4300₸",image:"https://instagram.fksn3-1.fna.fbcdn.net/v/t51.82787-15/669870708_17862744456674192_4597685935872456893_n.jpg"},
{name:"Пижама BLACK",price:"4300₸",image:"https://scontent.fksn3-1.fna.fbcdn.net/v/t1.15752-9/677513936_2185097522287819_6905519790160162229_n.jpg"},
{name:"Белая футболка",price:"4300₸",image:"https://scontent.fksn3-1.fna.fbcdn.net/v/t1.15752-9/675006985_1214829737212019_5884185380731183768_n.jpg"},
{name:"Рубашка",price:"4300₸",image:"https://scontent.fksn3-1.fna.fbcdn.net/v/t1.15752-9/676857611_2008049373152780_458716015119722064_n.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* РЕНДЕР */
function render(){
let html = `
<div class="grid">
${products.map((p,i)=>`
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.price}</p>
<button class="add" onclick="add(${i})">В корзину</button>
<button class="buy" onclick="buy(${i})">Купить</button>
</div>
</div>
`).join("")}
</div>
`;

document.getElementById("app").innerHTML = html;
}

/* КОРЗИНА */
function add(i){
cart.push(products[i]);
save();
updateCart();
}

function updateCart(){
document.getElementById("count").innerText = cart.length;

let h = `<button class="closeCart" onclick="closeCart()">Закрыть корзину</button>`;
h += "<h3>Корзина</h3>";

cart.forEach((p,i)=>{
h+=`
<div class="cart-item">
${p.name}
<button class="remove" onclick="remove(${i})">X</button>
</div>
`;
});

h+=`<button class="btn" onclick="order()">WhatsApp заказ</button>`;

document.getElementById("cart").innerHTML = h;
}

/* УДАЛЕНИЕ */
function remove(i){
cart.splice(i,1);
save();
updateCart();
}

/* ОТКРЫТЬ/ЗАКРЫТЬ КОРЗИНУ */
function toggleCart(){
document.getElementById("cart").classList.add("open");
updateCart();
}

function closeCart(){
document.getElementById("cart").classList.remove("open");
}

/* ЗАКАЗ */
function order(){
let t="Заказ:\n";
cart.forEach(p=>t+=p.name+" "+p.price+"\n");

window.open(`https://wa.me/87789822346?text=${encodeURIComponent(t)}`);
}

function buy(i){
cart=[products[i]];
save();
updateCart();
order();
}

/* АДМИНКА */
function openAdmin(){
document.getElementById("admin").style.display="flex";
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

function checkPass(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("adminPanel").style.display="block";
}else{
alert("Неверный пароль");
}
}

function addProduct(){
products.push({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("img").value
});

save();
render();
}

/* START */
render();
updateCart();

</script>

</body>
</html>
