<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTK WEAR</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0b0d;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:18px 25px;
border-bottom:1px solid #222;
}

.logo{font-size:22px;font-weight:700;}

.btn{
background:#fff;
color:#000;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#141418;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
cursor:pointer;
}

.card-content{padding:12px;}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:12px;
cursor:pointer;
}

.add{background:#222;color:#fff;}
.buy{background:#fff;color:#000;}
.heart{background:#ff2b2b;color:#fff;}

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:15px;
display:none;
overflow:auto;
}

.page{padding:20px;}

.admin{
position:fixed;
bottom:20px;
right:20px;
background:#222;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<header>
<div class="logo">JTK WEAR</div>
<div>
<button class="btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
<button class="btn" onclick="openAdmin()">Admin</button>
</div>
</header>

<div id="app"></div>

<div class="cart" id="cart"></div>

<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div style="background:#111;padding:20px;border-radius:15px;width:300px;">
<h3>Admin Panel</h3>
<input id="a_name" placeholder="Название">
<input id="a_price" placeholder="Цена">
<input id="a_img" placeholder="Фото URL">
<button class="btn" onclick="addProduct()">Добавить товар</button>
<br><br>
<button class="btn" onclick="closeAdmin()">Закрыть</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Футболка Black",price:"4300₸",image:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b"},
{name:"Hoodie Oversize",price:"12000₸",image:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let fav = JSON.parse(localStorage.getItem("fav")) || [];

const phone="87789822346";

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("fav",JSON.stringify(fav));
}

/* HOME */
function render(){
let html = `
<div class="grid">
${products.map((p,i)=>`
<div class="card">
<img src="${p.image}" onclick="openProduct(${i})">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.price}</p>
<button class="add" onclick="add(${i})">В корзину</button>
<button class="heart" onclick="favAdd(${i})">❤</button>
</div>
</div>
`).join("")}
</div>
`;

document.getElementById("app").innerHTML = html;
}

/* PRODUCT PAGE */
function openProduct(i){
let p=products[i];

document.getElementById("app").innerHTML=`
<div class="page">
<h2>${p.name}</h2>
<img src="${p.image}" style="width:100%;border-radius:15px">
<h3>${p.price}</h3>

<button class="add" onclick="add(${i})">В корзину</button>
<button class="buy" onclick="buy(${i})">Купить</button>

<br><br>
<button class="btn" onclick="render()">← Назад</button>
</div>
`;
}

/* CART */
function add(i){
cart.push(products[i]);
save();
updateCart();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;

let h="<h3>Корзина</h3>";

cart.forEach(p=>{
h+=`<p>${p.name} - ${p.price}</p>`;
});

h+=`<button class="btn" onclick="order()">WhatsApp заказ</button>`;

document.getElementById("cart").innerHTML=h;
}

/* TOGGLE */
function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="block"?"none":"block";
}

/* ORDER */
function order(){
let text="Заказ:\n";
cart.forEach(p=>text+=p.name+" "+p.price+"\n");

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
}

/* BUY */
function buy(i){
cart=[products[i]];
save();
updateCart();
order();
}

/* FAVORITE */
function favAdd(i){
fav.push(products[i]);
save();
alert("Добавлено ❤");
}

/* IMAGE */
function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ADMIN */
function openAdmin(){
document.getElementById("adminModal").style.display="flex";
}

function closeAdmin(){
document.getElementById("adminModal").style.display="none";
}

function addProduct(){
let n=document.getElementById("a_name").value;
let p=document.getElementById("a_price").value;
let i=document.getElementById("a_img").value;

products.push({name:n,price:p,image:i});
save();
render();
closeAdmin();
}

/* INIT */
render();
updateCart();

</script>

</body>
</html>
